<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SSO Investment Line Bot Portal - LIFF</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: {
              900: '#0a1f44',
              800: '#1e3a5f',
              700: '#334155'
            },
            gold: '#ffd700',
            silver: '#c0c0c0'
          },
          animation: {
            'pulse-glow': 'pulseGlow 2s ease-in-out infinite',
            'eyes-glow': 'eyesGlow 1.5s ease-in-out infinite alternate',
            'fade-in': 'fadeIn 0.8s ease-out'
          },
          keyframes: {
            pulseGlow: {
              '0%, 100%': { boxShadow: '0 0 5px #ffd700, 0 0 10px #ffd700, 0 0 15px #ffd700' },
              '50%': { boxShadow: '0 0 20px #ffd700, 0 0 30px #ffd700, 0 0 40px #ffd700' }
            },
            eyesGlow: {
              '0%': { filter: 'drop-shadow(0 0 2px #ffd700)' },
              '100%': { filter: 'drop-shadow(0 0 5px #ffd700) drop-shadow(0 0 8px #ffd700)' }
            },
            fadeIn: {
              '0%': { opacity: '0', transform: 'translateY(20px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' }
            }
          }
        }
      }
    }
  </script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    :root {
      --navy-900: #0a1f44;
      --navy-800: #1e3a5f;
      --gold: #ffd700;
      --silver: #c0c0c0;
    }

    body {
      background: linear-gradient(135deg, var(--navy-900) 0%, var(--navy-800) 50%, #0f2a5a 100%);
      min-height: 100vh;
      font-family: 'Poppins', sans-serif;
    }

    .success { color: #ffd700; font-weight: 600; margin-top: 1rem; text-shadow: 0 0 5px rgba(255,215,0,0.5); }
    .error { color: #ff6b6b; font-weight: 600; margin-top: 1rem; }

    .investment-bot {
      width: 50px;
      height: 50px;
      animation: pulse-glow 3s ease-in-out infinite;
    }

    .bot-eyes {
      animation: eyes-glow 2s ease-in-out infinite alternate;
    }

    .profile-info {
      display: flex;
      align-items: center;
      margin-top: 1rem;
    }
    .profile-details h3 { margin: 0; color: white; }
    .profile-details p { margin: 0; font-size: 0.9rem; color: var(--silver); }

    .form-input {
      transition: all 0.3s ease;
    }
    .form-input:focus {
      box-shadow: 0 0 15px rgba(255,215,0,0.5), 0 0 25px rgba(255,215,0,0.3);
      border-color: #ffd700;
      transform: scale(1.02);
    }

    .btn-gold {
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }
    .btn-gold::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      transition: left 0.5s;
    }
    .btn-gold:hover::before {
      left: 100%;
    }
    .btn-gold:hover {
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 15px 35px rgba(255,215,0,0.6);
      background: linear-gradient(45deg, #ffd700, #ffed4a);
    }
  </style>
</head>
<body class="animate-fade-in">
  <div class="container mx-auto px-4 sm:px-6 py-8 sm:py-12 max-w-sm sm:max-w-md lg:max-w-lg mx-auto bg-navy-900/30 backdrop-blur-xl rounded-3xl shadow-2xl border border-gold/10 animate-fade-in hover:shadow-gold/20 transition-all duration-500">
    <h1 class="text-3xl sm:text-4xl lg:text-5xl font-bold text-white text-center mb-4 bg-gradient-to-r from-gold to-yellow-400 bg-clip-text text-transparent drop-shadow-2xl leading-tight">SSO INVEST IT Portal</h1>
    <p class="subtitle text-silver text-center mb-8 sm:mb-12 text-sm sm:text-base lg:text-lg font-medium opacity-90 max-w-md mx-auto px-4">Secure LINE-powered SSO Investment verification</p>

    <!-- Profile Section -->
    <div class="profile-card bg-navy-800/50 backdrop-blur-lg rounded-2xl p-8 border border-silver/30 shadow-xl mb-8 md:p-10 lg:mb-12">
      <div id="profile" class="text-center text-silver animate-pulse">
        <div class="loading-spinner w-12 h-12 mx-auto mb-4 border-4 border-silver/30 border-t-gold rounded-full animate-spin"></div>
        <p class="text-lg font-medium">Initializing secure investment connection...</p>
      </div>
    </div>

    <!-- Email Verification Form -->
    <div class="form-card bg-navy-800/80 backdrop-blur-2xl rounded-3xl p-10 border border-gold/30 shadow-2xl hover:shadow-gold/20 transition-all duration-500">
      <h3 class="text-white font-semibold text-2xl mb-8 text-center bg-gradient-to-r from-gold/20 to-silver/20 bg-clip-text">🔐 Verify SSO Email</h3>
      <div class="form-group mb-8">
        <input type="email" id="email" class="form-input w-full px-6 py-5 bg-navy-700/60 border-2 border-silver/40 hover:border-gold/50 rounded-2xl text-white placeholder-silver/60 focus:outline-none focus:border-gold text-lg placeholder:italic font-medium" placeholder="example.e@sso.go.th" required>
      </div>
      <button class="btn-gold w-full bg-gradient-to-r from-gold to-yellow-400 text-navy-900 font-bold py-5 px-10 rounded-2xl text-xl shadow-2xl hover:shadow-gold/60 transform transition-all duration-500 block mx-auto relative overflow-hidden group" onclick="verifyEmail()">
        <span class="relative z-10">🚀 Verify Email</span>
      </button>
      <div id="result" class="mt-6 text-center px-6 py-4 rounded-2xl font-semibold transition-all duration-500 bg-navy-700/50 border backdrop-blur-sm"></div>
    </div>
  </div>

  <script>
    let userProfile = null;

    async function main() {
      try {
        document.getElementById("profile").innerHTML = `
          <div class="text-center text-silver animate-pulse">
            <div class="loading-spinner w-12 h-12 mx-auto mb-4 border-4 border-silver/30 border-t-gold rounded-full animate-spin"></div>
            <p class="text-lg font-medium">Initializing secure investment connection...</p>
          </div>
        `;

        await liff.init({ liffId: "2009475865-FD9LSYoM" });

        if (!liff.isLoggedIn()) {
          liff.login();
        }

        userProfile = await liff.getProfile();
        document.getElementById("profile").innerHTML = `
          <div class="profile-info">
            <svg class="investment-bot" viewBox="0 0 80 100" fill="none" xmlns="http://www.w3.org/2000/svg">
              <!-- Investment Bot Head - Navy/Gold Theme -->
              <circle cx="40" cy="25" r="20" fill="#1e3a5f" stroke="#ffd700" stroke-width="2"/>
              
              <!-- Glowing Eyes -->
              <circle class="bot-eyes" cx="30" cy="22" r="4" fill="#ffd700"/>
              <circle class="bot-eyes" cx="50" cy="22" r="4" fill="#ffd700"/>
              
              <!-- Investment Glasses -->
              <ellipse cx="40" cy="22" rx="15" ry="3" fill="none" stroke="#ffd700" stroke-width="1.5" stroke-linecap="round"/>
              
              <!-- Antenna with Gold Top -->
              <line x1="40" y1="5" x2="40" y2="15" stroke="#1e3a5f" stroke-width="3" stroke-linecap="round"/>
              <circle cx="40" cy="3" r="3" fill="#ffd700"/>
              
              <!-- Body - Navy Suit -->
              <rect x="25" y="45" width="30" height="35" rx="10" fill="#0a1f44" stroke="#ffd700" stroke-width="2"/>
              
              <!-- Gold Tie -->
              <path d="M35 50 L40 65 L45 50 Z" fill="#ffd700"/>
              
              <!-- Arms -->
              <rect x="15" y="50" width="10" height="25" rx="5" fill="#1e3a5f" stroke="#ffd700" stroke-width="1.5"/>
              <rect x="55" y="50" width="10" height="25" rx="5" fill="#1e3a5f" stroke="#ffd700" stroke-width="1.5"/>
              
              <!-- Briefcase -->
              <rect x="58" y="70" width="15" height="12" rx="3" fill="#ffd700" stroke="#0a1f44" stroke-width="1.5"/>
              <rect x="59" y="71" width="13" height="1" fill="#0a1f44"/>
              
              <!-- Legs -->
              <rect x="30" y="80" width="8" height="15" rx="4" fill="#1e3a5f"/>
              <rect x="42" y="80" width="8" height="15" rx="4" fill="#1e3a5f"/>
            </svg>
            <div class="profile-details ml-4">
              <h3>${userProfile.displayName}</h3>
              <p>ID: ${userProfile.userId.slice(-8)}</p>
            </div>
          </div>
        `;
      } catch (error) {
        document.getElementById("profile").innerHTML = `
          <p style="color: #ff6b6b; text-align: center;">Connection error: ${error.message}</p>
        `;
      }
    }

    async function verifyEmail() {
      const email = document.getElementById("email").value;
      const resultEl = document.getElementById("result");

      if (!email) {
        resultEl.textContent = 'Please enter your SSO Email.';
        resultEl.className = 'error';
        return;
      }

      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(email)) {
        resultEl.textContent = '⚠ Please enter a valid email address.';
        resultEl.className = 'error';
        return;
      }

      // Send to Google Apps Script backend
      fetch("https://script.google.com/macros/s/AKfycbyNkowzoGMhz33rw6Ht2v-6PJWHrLje_5uIZzdbFtd7-tej0eNBXS6Op3Mr-h2n7J28uA/exec", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          email: email,
          userId: userProfile.userId,
          displayName: userProfile.displayName
        })
      })
      .then(res => {
        console.log("Response status:", res.status);
        return res.text(); // get raw response
      })
      .then(text => {
        console.log("Raw response:", text);
        try {
          const data = JSON.parse(text);
          if (data.status === "success") {
            resultEl.textContent = `✓ Verified: ${email}`;
            resultEl.className = 'success';
          } else {
            resultEl.textContent = `⚠ ${data.message}`;
            resultEl.className = 'error';
          }
        } catch (e) {
          console.error("JSON parse error:", e);
          resultEl.textContent = 'Server did not return valid JSON.';
          resultEl.className = 'error';
        }
      })
      .catch(err => {
        console.error("Fetch error:", err);
        resultEl.textContent = 'Error connecting to server.';
        resultEl.className = 'error';
      });

    }

    main();
  </script>
</body>
</html>
