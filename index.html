<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Financial Investment Portal - LIFF</title>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Heroicons for financial icons -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #1e3a8a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #f8fafc;
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 20% 80%, rgba(120, 119, 198, 0.3) 0%, transparent 50%),
                  radial-gradient(circle at 80% 20%, rgba(255, 119, 198, 0.3) 0%, transparent 50%);
      z-index: -1;
      animation: float 20s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(1deg); }
    }

    .container {
      max-width: 500px;
      width: 90%;
      background: rgba(30, 41, 59, 0.9);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 2.5rem;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(30, 58, 138, 0.3);
      position: relative;
      overflow: hidden;
    }

    .container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #3b82f6, #1e40af, #0ea5e9);
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #3b82f6, #1e40af);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
      margin-bottom: 0.5rem;
      letter-spacing: -0.025em;
    }

    .subtitle {
      text-align: center;
      font-size: 1rem;
      color: #94a3b8;
      font-weight: 400;
      margin-bottom: 2rem;
    }

    .icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 1rem;
      display: block;
    }

    .profile-card, .form-card {
      background: rgba(15, 23, 42, 0.6);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      border: 1px solid rgba(59, 130, 246, 0.2);
      transition: all 0.3s ease;
    }

    .profile-card:hover, .form-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 40px rgba(59, 130, 246, 0.2);
      border-color: rgba(59, 130, 246, 0.4);
    }

    .profile-info {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-top: 1rem;
    }

    .avatar {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3b82f6, #1e40af);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      color: white;
      flex-shrink: 0;
    }

    .profile-details h3 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #f8fafc;
      margin-bottom: 0.25rem;
    }

    .profile-details p {
      font-size: 0.9rem;
      color: #94a3b8;
    }

    .form-group {
      position: relative;
      margin-bottom: 1.5rem;
    }

    .form-group label {
      position: absolute;
      top: 1rem;
      left: 1.25rem;
      font-size: 0.95rem;
      color: #94a3b8;
      transition: all 0.3s ease;
      pointer-events: none;
    }

    .form-group input:focus + label,
    .form-group input:valid + label {
      top: -0.5rem;
      left: 0.75rem;
      font-size: 0.75rem;
      color: #3b82f6;
      font-weight: 500;
      background: rgba(15, 23, 42, 0.8);
      padding: 0 0.5rem;
    }

    .form-group input {
      width: 100%;
      padding: 1rem 1.25rem;
      background: rgba(15, 23, 42, 0.8);
      border: 2px solid rgba(59, 130, 246, 0.3);
      border-radius: 12px;
      font-size: 1rem;
      color: #f8fafc;
      font-family: inherit;
      transition: all 0.3s ease;
    }

    .form-group input:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
      transform: translateY(-2px);
    }

    .form-group input::placeholder {
      color: #64748b;
    }

    button {
      width: 100%;
      padding: 1rem 2rem;
      background: linear-gradient(135deg, #3b82f6 0%, #1e40af 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    button:hover {
      transform: translateY(-3px);
      box-shadow: 0 20px 40px rgba(59, 130, 246, 0.4);
    }

    button:active {
      transform: translateY(-1px);
    }

    #result {
      margin-top: 1rem;
      padding: 1rem;
      border-radius: 12px;
      font-weight: 500;
      min-height: 20px;
      text-align: center;
    }

    .success {
      background: rgba(16, 185, 129, 0.2);
      color: #10b981;
      border: 1px solid rgba(16, 185, 129, 0.3);
    }

    .error {
      background: rgba(239, 68, 68, 0.2);
      color: #ef4444;
      border: 1px solid rgba(239, 68, 68, 0.3);
    }

    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 1s ease-in-out infinite;
      margin-right: 0.5rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 480px) {
      .container {
        padding: 2rem 1.5rem;
        margin: 1rem;
      }
      h1 { font-size: 1.75rem; }
    }

    .financial-icon {
      color: #3b82f6;
      width: 24px;
      height: 24px;
      margin-right: 0.5rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Financial Icon Header -->
    <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1"></path>
    </svg>
    
    <h1>SSO INVEST IT Portal</h1>
    <p class="subtitle">Secure LINE-powered SSO Investment verification</p>

    <!-- Profile Section -->
    <div class="profile-card" id="profile">
      <div style="text-align: center; color: #94a3b8;">
        <div class="loading"></div>
        Initializing secure connection...
      </div>
    </div>

    <!-- Email Verification Form -->
    <div class="form-card">
      <div style="display: flex; align-items: center; margin-bottom: 1rem;">
        <svg class="financial-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path>
        </svg>
        <h3 style="color: #f8fafc; font-size: 1.1rem; font-weight: 600;">Verify SSO Email</h3>
      </div>
      
      <div class="form-group">
        <input type="email" id="email" placeholder=" " required>
        <label for="email">example.e@sso.go.th</label>
      </div>
      
      <button onclick="verifyEmail()">
        Verify & Continue
      </button>
      
      <div id="result"></div>
    </div>
  </div>

  <script>
    async function main() {
      try {
        // Show loading
        document.getElementById("profile").innerHTML = `
          <div style="text-align: center; color: #94a3b8;">
            <div class="loading"></div>
            Initializing secure connection...
          </div>
        `;

        // Initialize LIFF with your LIFF ID
        await liff.init({ liffId: "2009475865-FD9LSYoM" });

        // Ensure user is logged in
        if (!liff.isLoggedIn()) {
          liff.login();
        }

        // Get user profile
        const profile = await liff.getProfile();
        document.getElementById("profile").innerHTML = `
          <div class="profile-info">
            <div class="avatar">${profile.displayName.charAt(0).toUpperCase()}</div>
            <div class="profile-details">
              <h3>${profile.displayName}</h3>
              <p>User ID: ${profile.userId.substring(0, 16)}...</p>
            </div>
          </div>
        `;
      } catch (error) {
        document.getElementById("profile").innerHTML = `
          <p style="color: #ef4444; text-align: center;">Connection error: ${error.message}</p>
        `;
      }
    }

    function verifyEmail() {
      const email = document.getElementById("email").value;
      const resultEl = document.getElementById("result");
      
      if (email) {
        // Client-side validation
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (emailRegex.test(email)) {
          resultEl.textContent = `✓ Verified: ${email}`;
          resultEl.className = 'success';
        } else {
          resultEl.textContent = '⚠ Please enter a valid email address.';
          resultEl.className = 'error';
        }
      } else {
        resultEl.textContent = 'Please enter your SSO Email.';
        resultEl.className = 'error';
      }
    }

    // Initialize on load
    main();
  </script>
</body>
</html>
